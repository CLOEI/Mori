# Thanks for reference https://github.com/StileDevs/growtopia.js/blob/main/.github/workflows/CI.yml :D

name: Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags-ignore: "*"
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - "frida"
      - "stuff"
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  APP_NAME: Mori

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            bin: Mori.exe
          - host: windows-latest
            target: i686-pc-windows-msvc
            bin: Mori.exe
          - host: macos-latest
            target: x86_64-apple-darwin
            bin: Mori
          - host: macos-latest
            target: aarch64-apple-darwin
            bin: Mori
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: Mori
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: Mori
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: Mori
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.settings.target }}

    - name: Cache Build
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "${{ matrix.settings.target }}-build"

    - name: Setup Cross-Compilation Toolchain
      if: matrix.settings.setup
      run: ${{ matrix.settings.setup }}

    - name: Build
      shell: bash
      run: |
        # Explicitly set the linker for cross-compilation targets
        if [ "${{ matrix.settings.target }}" == "aarch64-unknown-linux-gnu" ]; then
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
        elif [ "${{ matrix.settings.target }}" == "x86_64-unknown-linux-musl" ]; then
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
        fi
        
        cargo build --release --target ${{ matrix.settings.target }}

    - name: Stage Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        # If cross-compiling, path is target/<triple>/release. Else target/release.
        if [ -f "target/${{ matrix.settings.target }}/release/${{ matrix.settings.bin }}" ]; then
          cp "target/${{ matrix.settings.target }}/release/${{ matrix.settings.bin }}" dist/
        else
          cp "target/release/${{ matrix.settings.bin }}" dist/
        fi

        cp index.html dist/ || true
        cp items.dat dist/ || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-${{ matrix.settings.target }}
        path: dist/

  release:
    name: Github Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads

      - name: Create Release
        shell: bash
        run: |
          VERSION=$(git log -1 --pretty=%B | tr -d '\n')
          
          if echo "$VERSION" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            mkdir -p release_assets
            cd downloads
            for dir in Mori-*/; do
              target_dir="${dir%/}" 
              cd "$target_dir"
              if [[ "$target_dir" == *"windows"* ]]; then
                7z a -tzip "../../release_assets/${target_dir}.zip" *
              else
                tar -czf "../../release_assets/${target_dir}.tar.gz" .
              fi
              cd ..
            done
            cd ..

            gh release create "$VERSION" \
              ./release_assets/* \
              --title "v$VERSION" \
              --generate-notes \
              --target ${{ github.sha }}
          else
            echo "Commit message '$VERSION' is not a semver. No release created."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}